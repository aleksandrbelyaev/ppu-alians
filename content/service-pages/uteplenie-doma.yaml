faq:
  enabled: true
  kicker: "FAQ"
  heading: "Вопросы по утеплению дома ППУ"
  intro: "FAQ должен формироваться под конкретную услугу. Для страницы дома — вопросы про стены, кровлю, внутреннее/наружное утепление, слой, запах, отделку и цену."
  buttonLabel: "Задать вопрос"
  items:
    - question: "Сколько стоит утепление дома ППУ?"
      answer: "Ориентир по акции — от 1190 ₽/м² для ППУ 30–35 кг/м³. Итоговая цена зависит от площади, толщины слоя, плотности, подготовки поверхности, удаленности объекта и сложности доступа."
    - question: "Какая толщина ППУ нужна для дома?"
      answer: "Толщина подбирается по зоне работ и конструкции. Для мансарды, стен, пола, перекрытий и цоколя могут использоваться разные решения. Поэтому корректнее считать не «среднюю толщину», а конкретный узел дома."
    - question: "Можно ли утеплять дом изнутри?"
      answer: "Да, но не всегда это оптимальный вариант. Внутреннее утепление зависит от конструкции стены, влажности, вентиляции и будущей отделки. Перед решением нужно оценить, где будет точка росы и как будет закрываться слой."
    - question: "Подходит ли ППУ для деревянного дома?"
      answer: "Подходит не во всех сценариях одинаково. Нужно учитывать состояние древесины, влажность, вентиляционный режим и отделку. Решение лучше принимать после осмотра или анализа фото и конструкции."
    - question: "Нужно ли закрывать ППУ после напыления?"
      answer: "Обычно да. Внутри дома слой закрывают отделочными материалами, а на открытых участках нужна защита от ультрафиолета и механического воздействия."
    - question: "Есть ли запах после напыления?"
      answer: "Во время работ используется профессиональное оборудование и компоненты. После нанесения объект должен проветриваться. Сроки допуска к дальнейшим работам зависят от условий на объекте и применяемой системы."
    - question: "Можно ли утеплить только мансарду или кровлю?"
      answer: "Да. Часто начинают именно с кровли, мансарды или чердака, потому что верхний контур дома заметно влияет на теплопотери и комфорт внутри помещений."
    - question: "Как быстро можно получить расчет?"
      answer: "Предварительный расчет можно сделать по фото, площади, адресу и описанию задачи. Для точной сметы может потребоваться осмотр объекта и уточнение поверхности, толщины слоя и материала."

