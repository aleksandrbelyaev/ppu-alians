tiers:
  enabled: true
  kicker: "Технология"
  heading: "Подбираем ППУ под конструкцию дома"
  intro: "Услуга не должна продаваться как «одна пена на все случаи». Для дома важны поверхность, влажность, будущая отделка, плотность и толщина слоя."
  asideTitle: "Почему нельзя считать только по цене за м²"
  asideText: "Две сметы могут выглядеть одинаково по площади, но отличаться по толщине слоя, плотности материала, подготовке поверхности и условиям гарантии."
  noteTitle: "Правильный расчет = объект + слой + плотность + поверхность"
  noteText: "Именно поэтому на странице нужен CTA с запросом фото, площади и описания задачи."
  cards:
