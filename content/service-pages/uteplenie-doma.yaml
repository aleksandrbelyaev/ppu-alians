      title: "Базовое утепление дома"
      text: "Частый вариант для теплоизоляции стен, кровли, мансарды, пола и перекрытий."
    - pill: "40+ кг/м³"
      title: "Более плотный слой"
      text: "Рассматривается для зон с повышенной нагрузкой, наружных работ и специальных условий эксплуатации."
    - pill: "5–10 см"
      title: "Толщина слоя"
      text: "Определяется по конструкции и задаче: мансарда, кровля, стены, цоколь или перекрытия требуют разного подхода."
    - pill: "защита"
      title: "Финиш и закрытие ППУ"
      text: "Открытые участки требуют защиты от УФ и механического воздействия, а внутри дома важно учитывать дальнейшую отделку."

